<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b27;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cableGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="40%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3" />
    </linearGradient>

    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2d3d" />
      <stop offset="100%" style="stop-color:#0f1923" />
    </linearGradient>

    <linearGradient id="ramGradBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003a4a" />
      <stop offset="100%" style="stop-color:#001f2a" />
    </linearGradient>

    <linearGradient id="ramGradPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1445" />
      <stop offset="100%" style="stop-color:#150a25" />
    </linearGradient>

    <linearGradient id="memAccessGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.9" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect x="2" y="2" width="556" height="216" rx="18"/>
    </clipPath>

    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#00ff88"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="560" height="220" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#cardClip)" opacity="0.05">
    <line x1="0" y1="40" x2="560" y2="40" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="560" y2="80" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="560" y2="120" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="560" y2="160" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="70" y1="0" x2="70" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="140" y1="0" x2="140" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="210" y1="0" x2="210" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="280" y1="0" x2="280" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="490" y1="0" x2="490" y2="220" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <!-- ================================================================ -->
  <!-- LEFT NODE  (NODE A)                                              -->
  <!-- ================================================================ -->

  <!-- RAM module A -->
  <g filter="url(#glow)">
    <rect x="22" y="10" width="88" height="26" rx="3" fill="url(#ramGradBlue)" stroke="#00d4ff" stroke-width="1.2"/>
    <rect x="57" y="33" width="6" height="5" rx="1" fill="#0d1117"/>
    <rect x="28" y="15" width="10" height="11" rx="1" fill="#00d4ff" opacity="0.25"/>
    <rect x="42" y="15" width="10" height="11" rx="1" fill="#00d4ff" opacity="0.25"/>
    <rect x="56" y="15" width="10" height="11" rx="1" fill="#00d4ff" opacity="0.25"/>
    <rect x="70" y="15" width="10" height="11" rx="1" fill="#00d4ff" opacity="0.25"/>
    <rect x="84" y="15" width="10" height="11" rx="1" fill="#00d4ff" opacity="0.25"/>
    <text x="66" y="26" font-family="'Courier New', monospace" font-size="6" fill="#00d4ff" opacity="0.9" text-anchor="middle" font-weight="bold">SYSTEM RAM</text>
  </g>

  <!-- Local bus: RAM to CPU (normal OS path, dimmed) -->
  <line x1="66" y1="36" x2="66" y2="52" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- LEFT CPU chip -->
  <g filter="url(#glow)">
    <rect x="22" y="52" width="88" height="72" rx="6" fill="url(#chipGrad)" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="32" y="62" width="68" height="52" rx="3" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <rect x="37" y="67" width="22" height="22" rx="2" fill="#00d4ff" opacity="0.12"/>
    <rect x="63" y="67" width="22" height="22" rx="2" fill="#00d4ff" opacity="0.12"/>
    <rect x="37" y="93" width="22" height="14" rx="2" fill="#00d4ff" opacity="0.08"/>
    <rect x="63" y="93" width="22" height="14" rx="2" fill="#00d4ff" opacity="0.08"/>
    <text x="66" y="117" font-family="'Courier New', monospace" font-size="6.5" fill="#00d4ff" opacity="0.8" text-anchor="middle">CPU · NODE A</text>
    <!-- Left pins -->
    <line x1="16" y1="68" x2="22" y2="68" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="80" x2="22" y2="80" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="92" x2="22" y2="92" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="104" x2="22" y2="104" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right pins -->
    <line x1="110" y1="74" x2="118" y2="74" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="110" y1="88" x2="118" y2="88" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="110" y1="102" x2="118" y2="102" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- ================================================================ -->
  <!-- RIGHT NODE  (NODE B)                                             -->
  <!-- ================================================================ -->

  <!-- RAM module B -->
  <g filter="url(#glow)">
    <rect x="450" y="10" width="88" height="26" rx="3" fill="url(#ramGradPurple)" stroke="#a855f7" stroke-width="1.2"/>
    <rect x="485" y="33" width="6" height="5" rx="1" fill="#0d1117"/>
    <rect x="456" y="15" width="10" height="11" rx="1" fill="#a855f7" opacity="0.25"/>
    <rect x="470" y="15" width="10" height="11" rx="1" fill="#a855f7" opacity="0.25"/>
    <rect x="484" y="15" width="10" height="11" rx="1" fill="#a855f7" opacity="0.25"/>
    <rect x="498" y="15" width="10" height="11" rx="1" fill="#a855f7" opacity="0.25"/>
    <rect x="512" y="15" width="10" height="11" rx="1" fill="#a855f7" opacity="0.25"/>
    <text x="494" y="26" font-family="'Courier New', monospace" font-size="6" fill="#a855f7" opacity="0.9" text-anchor="middle" font-weight="bold">SYSTEM RAM</text>
  </g>

  <!-- Local bus: RAM to CPU (normal OS path, dimmed) -->
  <line x1="494" y1="36" x2="494" y2="52" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- RIGHT CPU chip -->
  <g filter="url(#glow)">
    <rect x="450" y="52" width="88" height="72" rx="6" fill="url(#chipGrad)" stroke="#a855f7" stroke-width="1.5"/>
    <rect x="460" y="62" width="68" height="52" rx="3" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
    <rect x="465" y="67" width="22" height="22" rx="2" fill="#a855f7" opacity="0.12"/>
    <rect x="491" y="67" width="22" height="22" rx="2" fill="#a855f7" opacity="0.12"/>
    <rect x="465" y="93" width="22" height="14" rx="2" fill="#a855f7" opacity="0.08"/>
    <rect x="491" y="93" width="22" height="14" rx="2" fill="#a855f7" opacity="0.08"/>
    <text x="494" y="117" font-family="'Courier New', monospace" font-size="6.5" fill="#a855f7" opacity="0.8" text-anchor="middle">CPU · NODE B</text>
    <!-- Left pins -->
    <line x1="442" y1="74" x2="450" y2="74" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="442" y1="88" x2="450" y2="88" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="442" y1="102" x2="450" y2="102" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right pins -->
    <line x1="538" y1="68" x2="544" y2="68" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="538" y1="80" x2="544" y2="80" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="538" y1="92" x2="544" y2="92" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="538" y1="104" x2="544" y2="104" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- ================================================================ -->
  <!-- BYPASSED CPU PATH — dashed grey line through the CPUs            -->
  <!-- ================================================================ -->
  <g opacity="0.25">
    <path d="M 110 88 C 145 88, 148 105, 175 105 L 385 105 C 412 105, 415 88, 442 88"
          stroke="#4a5568" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
    <text x="280" y="114" font-family="'Courier New', monospace" font-size="5.5" fill="#4a5568" text-anchor="middle">— OS / KERNEL PATH (BYPASSED) —</text>
  </g>

  <!-- ================================================================ -->
  <!-- RDMA DIRECT MEMORY PATH — glowing green arc above everything     -->
  <!-- ================================================================ -->
  <g filter="url(#greenGlow)">
    <path d="M 110 22 C 180 22, 180 56, 280 56 C 380 56, 380 22, 450 22"
          stroke="url(#memAccessGrad)" stroke-width="2.5" fill="none"
          stroke-linecap="round" marker-end="url(#arrowGreen)"/>
    <path d="M 110 27 C 180 27, 182 61, 280 61 C 378 61, 380 27, 450 27"
          stroke="#00ff88" stroke-width="1" fill="none" opacity="0.25"
          stroke-linecap="round"/>
  </g>

  <!-- Data packets flying along the RDMA path -->
  <rect x="232" y="51" width="20" height="8" rx="4" fill="#00ff88" opacity="0.95" filter="url(#glow)"/>
  <rect x="192" y="49" width="14" height="6" rx="3" fill="#00ffcc" opacity="0.7"/>
  <rect x="338" y="51" width="14" height="6" rx="3" fill="#00ff88" opacity="0.7"/>

  <!-- "DIRECT MEMORY ACCESS" label on the arc -->
  <text x="280" y="45" font-family="'Courier New', monospace" font-size="7.5"
        fill="#00ff88" text-anchor="middle" letter-spacing="2" font-weight="bold"
        filter="url(#greenGlow)">DIRECT MEMORY ACCESS</text>

  <!-- Connectors from RAM chips to the arc path -->
  <line x1="66" y1="10" x2="66" y2="4" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="494" y1="10" x2="494" y2="4" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>

  <!-- ================================================================ -->
  <!-- CENTER RDMA FABRIC HUB                                           -->
  <!-- ================================================================ -->
  <g filter="url(#softGlow)">
    <circle cx="280" cy="88" r="18" fill="#0d1117" stroke="#00d4ff" stroke-width="1.2" opacity="0.95"/>
    <circle cx="280" cy="88" r="12" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <path d="M 283 79 L 276 88 L 281 88 L 276 97 L 285 86 L 280 86 Z"
          fill="#00d4ff" opacity="0.95"/>
  </g>

  <!-- CPU-level data lanes (fabric / NIC lanes) -->
  <g filter="url(#glow)" opacity="0.65">
    <path d="M 118 74 C 155 74, 162 72, 200 72 L 360 72 C 398 72, 405 74, 442 74"
          stroke="url(#cableGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M 118 88 L 262 88 M 298 88 L 442 88"
          stroke="url(#cableGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 118 102 C 155 102, 162 106, 200 106 L 360 106 C 398 106, 405 102, 442 102"
          stroke="url(#cableGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ================================================================ -->
  <!-- TEXT SECTION                                                     -->
  <!-- ================================================================ -->
  <text x="280" y="170"
        font-family="'Courier New', Courier, monospace"
        font-size="28" font-weight="bold"
        fill="#ffffff" text-anchor="middle"
        letter-spacing="6">RDMA<tspan fill="#00d4ff">.</tspan>LAB</text>

  <text x="280" y="188"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" fill="#00ff88" text-anchor="middle"
        letter-spacing="2" opacity="0.9">REMOTE DIRECT MEMORY ACCESS</text>

  <text x="280" y="204"
        font-family="'Courier New', Courier, monospace"
        font-size="7.5" fill="#8892a4" text-anchor="middle"
        letter-spacing="2">EXPLORE · EXPERIMENT · LEARN</text>

  <!-- Border glow -->
  <rect x="1" y="1" width="558" height="218" rx="19" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
</svg>
